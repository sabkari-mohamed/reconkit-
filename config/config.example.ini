; ReconKit API key configuration.
; Copy this file to config/config.ini and fill in your keys.
; config/config.ini is gitignored so real keys are never committed.
; Environment variables HUNTER_API_KEY / SHODAN_API_KEY override these.

[hunter]
; Free tier: https://hunter.io/api-keys
api_key =

[shodan]
; Free key: https://account.shodan.io/
api_key =

[urlscan]
; Optional — works without a key (rate-limited). Free key raises limits:
; https://urlscan.io/user/profile/
api_key =
